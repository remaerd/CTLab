<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hexagon Chladni Waves</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mozilla+Headline:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #ccd6f6;
    }
    body.ui-hidden #controls {
      display: none;
    }
    #controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 24px;
      padding: 14px 20px;
      width: 100%;
      background: rgba(0,0,0,0.04);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid rgba(100,150,255,0.15);
      z-index: 10;
    }
    .ctrl {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      min-width: 130px;
    }
    .ctrl-label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: #000; }
    .ctrl-value { font-size: 18px; font-weight: 600; color: #000; min-width: 2.2em; text-align: center; }
    input[type="range"] {
      -webkit-appearance: none;
      width: 130px; height: 4px; border-radius: 2px;
      background: rgba(0,0,0,0.2); outline: none; cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: #000; box-shadow: 0 0 6px #000; cursor: pointer;
    }
    .ctrl-btn {
      border: 1px solid rgba(0,0,0,0.35);
      background: rgba(255,255,255,0.8);
      color: #000;
      height: 32px;
      padding: 0 14px;
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .ctrl-btn:hover {
      background: #000;
      color: #fff;
    }
    #canvas-wrap { flex: 1; width: 100%; }
    #headline {
      position: fixed;
      inset: 0;
      z-index: 11;
      font-family: 'Mozilla Headline', 'Segoe UI', Arial, sans-serif;
      font-size: clamp(34px, 11vw, 150px);
      font-weight: 700;
      line-height: 0.7;
      letter-spacing: -0.015em;
      color: rgba(0, 0, 0, 0.92);
      pointer-events: none;
      user-select: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: clamp(10px, 2.5vh, 32px);
      width: 100vw;
      height: 100vh;
    }
    #headline span {
      display: block;
      width: max-content;
      transition: transform 1.15s cubic-bezier(0.4, 0.0, 0.2, 1);
      will-change: transform;
    }
    canvas { display: block; }
  </style>
</head>
<body>

<h1 id="headline"><span>Creative</span><span>Technologies</span><span>Lab</span></h1>

<div id="controls">
  <div class="ctrl">
    <span class="ctrl-label">Hex Size</span>
    <span class="ctrl-value" id="vSize">1</span>
    <input type="range" id="sSize" min="1" max="20" value="1" step="0.5">
  </div>
  <div class="ctrl">
    <span class="ctrl-label">Mode m</span>
    <span class="ctrl-value" id="vM">2</span>
    <input type="range" id="sM" min="1" max="12" value="2">
  </div>
  <div class="ctrl">
    <span class="ctrl-label">Mode n</span>
    <span class="ctrl-value" id="vN">8</span>
    <input type="range" id="sN" min="1" max="12" value="8">
  </div>
  <div class="ctrl">
    <span class="ctrl-label">Animate</span>
    <span class="ctrl-value" id="vAnim">1.0</span>
    <input type="range" id="sAnim" min="-100" max="100" value="100">
  </div>
  <div class="ctrl">
    <span class="ctrl-label">Screen</span>
    <button type="button" id="btnFullscreen" class="ctrl-btn">Full Screen</button>
  </div>
</div>

<div id="canvas-wrap"></div>

<script>
// CPU line renderer for hexagonal Chladni nodal curves (no shader)
new p5(sketch => {
  let t = 0;
  let sliders, vals, controlsH, controlsEl, fullscreenBtn;
  let headlineEl, headlineWords;
  let uiHidden = false;
  let alignCycle = [0, 1, 2];
  let alignTimer = null;
  const PI23 = Math.PI * 2 / 3;
  const PI3 = Math.PI / 3;

  function updateCanvasSize() {
    controlsH = controlsEl.offsetHeight;
    sketch.resizeCanvas(sketch.windowWidth, sketch.windowHeight - controlsH);
    applyHeadlineAlignment();
  }

  function setUiHidden(hidden) {
    uiHidden = hidden;
    document.body.classList.toggle('ui-hidden', uiHidden);
    updateCanvasSize();
  }

  function xForAlign(wordWidth, lineWidth, align) {
    if (align === 1) return (lineWidth - wordWidth) * 0.5;
    if (align === 2) return lineWidth - wordWidth;
    return 0;
  }

  function applyHeadlineAlignment() {
    if (!headlineEl || !headlineWords) return;
    const lineWidth = headlineEl.clientWidth;
    headlineWords.forEach((word, i) => {
      const wordWidth = word.offsetWidth;
      const x = xForAlign(wordWidth, lineWidth, alignCycle[i]);
      word.style.transform = `translateX(${Math.max(0, x)}px)`;
    });
  }

  function rotateHeadlineAlignment() {
    alignCycle = alignCycle.map((v) => (v + 1) % 3);
    applyHeadlineAlignment();
  }

  async function enterFullscreen() {
    if (document.fullscreenElement) return;
    try {
      await document.documentElement.requestFullscreen({ navigationUI: 'hide' });
    } catch (_) {
      try {
        await document.documentElement.requestFullscreen();
      } catch (_) {
        // Fullscreen can fail due to browser policy; keep rendering normally.
      }
    }
  }

  async function exitFullscreen() {
    if (!document.fullscreenElement) return;
    try {
      await document.exitFullscreen();
    } catch (_) {
      // Ignore exit failures.
    }
  }

  async function toggleFullscreen() {
    if (document.fullscreenElement) {
      await exitFullscreen();
    } else {
      await enterFullscreen();
    }
  }

  function syncFullscreenBtn() {
    if (!fullscreenBtn) return;
    fullscreenBtn.textContent = document.fullscreenElement ? 'Exit Full Screen' : 'Full Screen';
  }

  function toggleUI() {
    if (document.fullscreenElement) {
      exitFullscreen();
    } else {
      enterFullscreen();
    }
  }

  sketch.setup = function () {
    sketch.pixelDensity(1);
    controlsEl = document.getElementById('controls');
    fullscreenBtn = document.getElementById('btnFullscreen');
    headlineEl = document.getElementById('headline');
    headlineWords = Array.from(headlineEl.querySelectorAll('span'));
    controlsH = controlsEl.offsetHeight;
    let cnv = sketch.createCanvas(
      sketch.windowWidth,
      sketch.windowHeight - controlsH
    );
    cnv.parent('canvas-wrap');
    sketch.noStroke();

    sliders = {
      size: document.getElementById('sSize'),
      m:    document.getElementById('sM'),
      n:    document.getElementById('sN'),
      anim: document.getElementById('sAnim'),
    };
    vals = {
      size: document.getElementById('vSize'),
      m:    document.getElementById('vM'),
      n:    document.getElementById('vN'),
      anim: document.getElementById('vAnim'),
    };

    Object.entries(sliders).forEach(([k, el]) => {
      el.addEventListener('input', () => syncLabel(k));
    });

    Object.keys(sliders).forEach(syncLabel);
    applyHeadlineAlignment();

    alignTimer = window.setInterval(() => {
      rotateHeadlineAlignment();
    }, 5000);

    fullscreenBtn.addEventListener('click', () => {
      toggleFullscreen();
    });

    document.addEventListener('fullscreenchange', syncFullscreenBtn);
    document.addEventListener('fullscreenchange', () => {
      setUiHidden(Boolean(document.fullscreenElement));
    });
    syncFullscreenBtn();

    window.addEventListener('keydown', (ev) => {
      if (ev.code !== 'Space') return;
      const active = document.activeElement;
      if (active && /input|textarea|select/i.test(active.tagName)) return;
      ev.preventDefault();
      toggleUI();
    });
  };

  function syncLabel(k) {
    let raw = parseFloat(sliders[k].value);
    vals[k].textContent = k === 'anim' ? (raw / 100).toFixed(1) : raw;
  }

  function hexChladni(x, y, m, n, phase) {
    if (Math.abs(m - n) < 0.5) {
      let s = 0;
      for (let k = 0; k < 6; k++) {
        const a = k * PI3;
        s += Math.cos(m * (x * Math.cos(a) + y * Math.sin(a)) + phase);
      }
      return s / 6;
    }

    let s = 0;
    for (let k = 0; k < 3; k++) {
      const a = k * PI23;
      const c = Math.cos(a);
      const sv = Math.sin(a);
      const rx = x * c - y * sv;
      const ry = x * sv + y * c;
      s += Math.cos(m * rx + phase) * Math.cos(n * ry)
         - Math.cos(n * rx + phase) * Math.cos(m * ry);
    }
    return s / 3;
  }

  function interp(x1, y1, v1, x2, y2, v2) {
    const d = v1 - v2;
    const a = Math.abs(d) < 1e-6 ? 0.5 : v1 / d;
    return [x1 + (x2 - x1) * a, y1 + (y2 - y1) * a];
  }

  sketch.draw = function () {
    const anim = parseFloat(sliders.anim.value) / 100;
    t += anim * 0.025;

    const m = parseFloat(sliders.m.value);
    const n = parseFloat(sliders.n.value);
    const size = parseFloat(sliders.size.value);
    const freq = 0.025 / size;
    const step = 8;

    sketch.background(255, 255, 255);
    sketch.stroke(0, 0, 0);
    sketch.strokeWeight(1.2);
    sketch.noFill();

    const cols = Math.floor(sketch.width / step) + 2;
    const rows = Math.floor(sketch.height / step) + 2;
    const field = Array.from({ length: rows }, () => new Array(cols));

    for (let j = 0; j < rows; j++) {
      const py = j * step;
      for (let i = 0; i < cols; i++) {
        const px = i * step;
        const x = (px - sketch.width * 0.5) * freq;
        const y = (py - sketch.height * 0.5) * freq;
        field[j][i] = hexChladni(x, y, m, n, t);
      }
    }

    for (let j = 0; j < rows - 1; j++) {
      const y = j * step;
      for (let i = 0; i < cols - 1; i++) {
        const x = i * step;

        const v0 = field[j][i];
        const v1 = field[j][i + 1];
        const v2 = field[j + 1][i + 1];
        const v3 = field[j + 1][i];

        const pts = [];

        if ((v0 > 0) !== (v1 > 0)) pts.push(interp(x, y, v0, x + step, y, v1));
        if ((v1 > 0) !== (v2 > 0)) pts.push(interp(x + step, y, v1, x + step, y + step, v2));
        if ((v2 > 0) !== (v3 > 0)) pts.push(interp(x + step, y + step, v2, x, y + step, v3));
        if ((v3 > 0) !== (v0 > 0)) pts.push(interp(x, y + step, v3, x, y, v0));

        if (pts.length === 2) {
          sketch.line(pts[0][0], pts[0][1], pts[1][0], pts[1][1]);
        } else if (pts.length === 4) {
          const cx = (x + step * 0.5 - sketch.width * 0.5) * freq;
          const cy = (y + step * 0.5 - sketch.height * 0.5) * freq;
          const center = hexChladni(cx, cy, m, n, t);

          if (center > 0) {
            sketch.line(pts[0][0], pts[0][1], pts[1][0], pts[1][1]);
            sketch.line(pts[2][0], pts[2][1], pts[3][0], pts[3][1]);
          } else {
            sketch.line(pts[0][0], pts[0][1], pts[3][0], pts[3][1]);
            sketch.line(pts[1][0], pts[1][1], pts[2][0], pts[2][1]);
          }
        }
      }
    }
  };

  sketch.windowResized = function () {
    updateCanvasSize();
  };
});
</script>
</body>
</html>
